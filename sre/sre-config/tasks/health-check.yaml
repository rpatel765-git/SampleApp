api_version: azuresre.ai/v1
kind: ScheduledTask
spec:
  name: task-tracker-health-check
  description: Comprehensive health check of the Team Task Tracker application every 30 minutes
  cronExpression: "*/30 * * * *"
  agent: ""
  agentPrompt: |
    Perform a comprehensive health check of the Team Task Tracker application:

    1. Check the backend container app health:
       - Query the health endpoint status
       - Check container restart count (alert if > 0 in last 15 min)
       - Verify HTTP 2xx success rate (alert if < 95%)
       - Check response time p95 (alert if > 2 seconds)
       - Verify memory and CPU utilization

    2. Check infrastructure health:
       - Container App Environment status
       - Log Analytics workspace connectivity

    3. If ANY issues are detected:
       - Use the code-analyzer subagent to check for recent code changes
         that may have caused the issue
       - Use the incident-handler subagent to create a GitHub issue
       - Include full root cause analysis in the issue
